<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>AI Network</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    /* HEADER */
    .title {
      font-size: 60px;
      color: #2d6cdf;
      margin-bottom: 60px;
      letter-spacing: 2px;
    }

    /* HEXAGON (RICHTIG GEDREHT) */
    .hexagon {
      width: 400px;
      height: 200px;
      background: white;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    /* LINKS / RECHTS SPITZEN */
    .hexagon:before,
    .hexagon:after {
      content: "";
      position: absolute;
      width: 0;
      border-top: 100px solid transparent;
      border-bottom: 100px solid transparent;
    }

    .hexagon:before {
      left: -100px;
      border-right: 100px solid white;
    }

    .hexagon:after {
      right: -100px;
      border-left: 100px solid white;
    }

    /* BLAUER RAHMEN */
    .hex-border {
      position: absolute;
      width: 440px;
      height: 220px;
      background: #2d6cdf;
      z-index: -1;
    }

    .hex-border:before,
    .hex-border:after {
      content: "";
      position: absolute;
      width: 0;
      border-top: 110px solid transparent;
      border-bottom: 110px solid transparent;
    }

    .hex-border:before {
      left: -110px;
      border-right: 110px solid #2d6cdf;
    }

    .hex-border:after {
      right: -110px;
      border-left: 110px solid #2d6cdf;
    }

    /* SUCHLEISTE */
    .search-box {
      display: flex;
      width: 80%;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px 0 0 8px;
      outline: none;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #2d6cdf;
      color: white;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
    }

    button:hover {
      background: #1e4fbf;
    }

    /* ERGEBNISSE */
    .results {
      width: 420px;
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

  <h1 class="title">AI Network</h1>

  <div class="hex-border"></div>

  <div class="hexagon">
    <div class="search-box">
      <input id="query" placeholder="Was willst du wissen?">
      <button onclick="search()">Search</button>
    </div>
  </div>

  <div class="results" id="results"></div>

  <script>
    async function search() {
      const query = document.getElementById("query").value;

      const res = await fetch("https://ai-network-1.onrender.com/search", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ query })
      });

      const data = await res.json();

      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "";

      data.results.forEach((r, i) => {
        resultsDiv.innerHTML += `
          <div class="card">
            <strong>${i + 1}. ${r.model}</strong>
            <p>${r.answer}</p>
          </div>
        `;
      });
    }
  </script>

</body>
</html>
