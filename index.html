<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AI Network</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #0f172a, #020617);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
}

/* HEADER */
.title {
  font-size: 70px;
  color: #4da3ff;
  margin-bottom: 60px;
  text-shadow: 0 0 20px rgba(77,163,255,0.8);
}

/* GRID */
.honeycomb {
  display: grid;
  grid-template-columns: repeat(3, 220px);
  gap: 20px;
  justify-content: center;
}

/* HEX WRAPPER */
.hex-wrapper {
  position: relative;
  width: 220px;
  height: 130px;
}

/* GLOW BORDER */
.hex-border {
  width: 100%;
  height: 100%;
  background: #2d6cdf;
  clip-path: polygon(
    25% 0%, 75% 0%,
    100% 50%, 75% 100%,
    25% 100%, 0% 50%
  );
  position: absolute;
  filter: drop-shadow(0 0 10px #2d6cdf)
          drop-shadow(0 0 20px #2d6cdf);
}

/* INNER HEX */
.hexagon {
  position: absolute;
  top: 6px;
  left: 6px;
  width: calc(100% - 12px);
  height: calc(100% - 12px);
  background: #0f172a;
  clip-path: polygon(
    25% 0%, 75% 0%,
    100% 50%, 75% 100%,
    25% 100%, 0% 50%
  );

  display: flex;
  align-items: center;
  justify-content: center;
}

/* CENTER BIG HEX */
.center {
  transform: scale(1.5);
  z-index: 2;
}

/* SEARCH */
.search-box {
  display: flex;
  width: 90%;
}

input {
  flex: 1;
  padding: 8px;
  border: none;
  outline: none;
  background: #020617;
  color: white;
  border-radius: 6px 0 0 6px;
}

button {
  padding: 8px 12px;
  border: none;
  background: #2d6cdf;
  color: white;
  border-radius: 0 6px 6px 0;
  cursor: pointer;
}

button:hover {
  background: #4da3ff;
}

/* RESULTS */
.results {
  width: 400px;
  margin-top: 40px;
}

.card {
  background: #0f172a;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #2d6cdf;
  box-shadow: 0 0 10px rgba(45,108,223,0.5);
}
</style>
</head>

<body>

<h1 class="title">AI Network</h1>

<div class="honeycomb">

  <!-- oben links -->
  <div class="hex-wrapper">
    <div class="hex-border"></div>
    <div class="hexagon"></div>
  </div>

  <!-- oben mitte -->
  <div class="hex-wrapper">
    <div class="hex-border"></div>
    <div class="hexagon"></div>
  </div>

  <!-- oben rechts -->
  <div class="hex-wrapper">
    <div class="hex-border"></div>
    <div class="hexagon"></div>
  </div>

  <!-- mitte links -->
  <div class="hex-wrapper">
    <div class="hex-border"></div>
    <div class="hexagon"></div>
  </div>

  <!-- MITTE (HAUPT WABE) -->
  <div class="hex-wrapper center">
    <div class="hex-border"></div>
    <div class="hexagon">
      <div class="search-box">
        <input id="query" placeholder="Was willst du wissen?">
        <button onclick="search()">Go</button>
      </div>
    </div>
  </div>

  <!-- mitte rechts -->
  <div class="hex-wrapper">
    <div class="hex-border"></div>
    <div class="hexagon"></div>
  </div>

</div>

<div class="results" id="results"></div>

<script>
async function search() {
  const query = document.getElementById("query").value;

  const res = await fetch("https://ai-network-1.onrender.com/search", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ query })
  });

  const data = await res.json();

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  data.results.forEach((r, i) => {
    resultsDiv.innerHTML += `
      <div class="card">
        <strong>${i + 1}. ${r.model}</strong>
        <p>${r.answer}</p>
      </div>
    `;
  });
}
</script>

</body>
</html>
