<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AI Network</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* HEADER */
.title {
  font-size: 60px;
  color: #2d6cdf;
  margin-bottom: 60px;
}

/* HEXAGON CONTAINER */
.hex-wrapper {
  position: relative;
  width: 420px;
  height: 240px;
}

/* BLAUER RAHMEN */
.hex-border {
  width: 100%;
  height: 100%;
  background: #2d6cdf;
  clip-path: polygon(
    25% 0%, 75% 0%,
    100% 50%, 75% 100%,
    25% 100%, 0% 50%
  );
  position: absolute;
}

/* INNERE WABE */
.hexagon {
  position: absolute;
  top: 10px;
  left: 10px;
  width: calc(100% - 20px);
  height: calc(100% - 20px);
  background: white;
  clip-path: polygon(
    25% 0%, 75% 0%,
    100% 50%, 75% 100%,
    25% 100%, 0% 50%
  );

  display: flex;
  align-items: center;
  justify-content: center;
}

/* SUCHLEISTE */
.search-box {
  display: flex;
  width: 80%;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px 0 0 8px;
  outline: none;
}

button {
  padding: 12px 20px;
  border: none;
  background: #2d6cdf;
  color: white;
  border-radius: 0 8px 8px 0;
  cursor: pointer;
}

button:hover {
  background: #1e4fbf;
}

/* ERGEBNISSE */
.results {
  width: 420px;
  margin-top: 30px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1 class="title">AI Network</h1>

<div class="hex-wrapper">
  <div class="hex-border"></div>

  <div class="hexagon">
    <div class="search-box">
      <input id="query" placeholder="Was willst du wissen?">
      <button onclick="search()">Search</button>
    </div>
  </div>
</div>

<div class="results" id="results"></div>

<script>
async function search() {
  const query = document.getElementById("query").value;

  const res = await fetch("https://ai-network-1.onrender.com/search", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ query })
  });

  const data = await res.json();

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  data.results.forEach((r, i) => {
    resultsDiv.innerHTML += `
      <div class="card">
        <strong>${i + 1}. ${r.model}</strong>
        <p>${r.answer}</p>
      </div>
    `;
  });
}
</script>

</body>
</html>
